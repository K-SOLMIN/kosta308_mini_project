version: '3.8'

networks:
  kimdoolim-network:
    driver: bridge

services:
  mysql:
    image: mysql:8.0.45-debian
    container_name: kimdoolim-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1111
      MYSQL_DATABASE: kimdoolim
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Seoul
    ports:
      - "3308:3306"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    networks:
      - kimdoolim-network
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1111" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  server:
    image: kimsolmin/socketserver:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: kimdoolim-server
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kimdoolim-network
    restart: always
    environment:
      - LANG=ko_KR.UTF-8
      - LC_ALL=ko_KR.UTF-8
      - TZ=Asia/Seoul

  client:
    image: kimsolmin/socketclient:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: kimdoolim-client
    depends_on:
      - server
    stdin_open: true
    tty: true
    restart: always
    networks:
      - kimdoolim-network
    environment:
      - LANG=ko_KR.UTF-8
      - LC_ALL=ko_KR.UTF-8
      - TZ=Asia/Seoul
    command: tail -f /dev/null

volumes:
  mysql-data: